version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vulscan-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vulscan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vulscan"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: vulscan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-api:
    build: ./backend/web-api
    container_name: vulscan-web-api
    environment:
      POSTGRES_URL: postgres://admin:password@postgres:5432/vulscan
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      API_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scanner-worker:
    build: ./backend/scanner-engine
    container_name: vulscan-scanner-worker
    environment:
      POSTGRES_URL: postgres://admin:password@postgres:5432/vulscan
      REDIS_URL: redis://redis:6379/0
      WORKER_COUNT: 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: ./backend/task-scheduler
    container_name: vulscan-scheduler
    environment:
      POSTGRES_URL: postgres://admin:password@postgres:5432/vulscan
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: vulscan-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: vulscan-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
